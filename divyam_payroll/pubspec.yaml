name: divyam_payroll
description: "HAMS — Hospital Attendance Management System for Divyam Hospital"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # ── UI ─────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  camera: ^0.11.0

  # ── State Management ───────────────────────────────────
  flutter_riverpod: ^2.6.1

  # ── Navigation ─────────────────────────────────────────
  go_router: ^14.8.1

  # ── Network ────────────────────────────────────────────
  dio: ^5.7.0

  # ── Local Storage ──────────────────────────────────────
  hive_flutter: ^1.1.0

  # ── Date / Time ────────────────────────────────────────
  intl: ^0.19.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  supabase_flutter: ^2.14.2
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
